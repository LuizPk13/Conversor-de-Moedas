<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>DevClub - Conversor de Moeda</title>
  </head>
  <body>
    <img
      class="logo-gif"
      src="./assets/logo.gif"
      alt="logo-devclub-conversor-de-moeda"
    />
    <main>
      <label>
        Converter de:
        <select>
          <option>R$ Real Brasileiro</option>
        </select>
      </label>
      <label>
        Para:
        <select>
          <option>US$ Dólar Americano</option>
          <option>R$ Real Brasileiro</option>
          <option>€ Euro</option>
          <option>£ Libra</option>
        </select>
      </label>
      <label>
        Valor:
        <input placeholder="R$ 10.000,00" />
      </label>
      <button>Converter</button>
      <section>
        <div class="currency-box">
          <img src="./assets/Real 1.png" alt="Bandeira do Brasil" />
          <p class="currency">Real</p>
          <p class="currency-value">R$ 0,00</p>
        </div>
        <img class="seta-img" src="./assets/Seta.png" alt="Seta" />
        <div class="currency-box">
          <img src="./assets/Dolar 1.png" alt="Bandeira dos Estados Unidos" />
          <p class="currency">Dólar</p>
          <p class="currency-value">US$ 0,00</p>
        </div>
      </section>
    </main>
  </body>
</html>
