<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>DevClub - Conversor de Moeda</title>
  </head>
  <body>
    <img
      class="logo-gif"
      src="./assets/logo.gif"
      alt="logo-devclub-conversor-de-moeda"
    />
    <main>
      <label>
        Converter de:
        <select>
          <option>R$ Real Brasileiro</option>
        </select>
      </label>
      <label>
        Para:
        <select class="opcao-do-select">
          <option>Selecione uma moeda</option>
          <option value="dolar">US$ Dólar Americano</option>
          <option value="euro">€ Euro</option>
          <option value="libra">£ Libra</option>
        </select>
      </label>
      <label>
        Valor:
        <input class="valor-input" type="number" placeholder="R$ 10.000,00" />
      </label>
      <button class="botao-conversor">Converter</button>
      <section>
        <div class="valor-caixa">
          <img src="./assets/Real 1.png" alt="Bandeira do Brasil" />
          <p class="moeda">Real</p>
          <p class="valor-moeda-digitado">R$ 0,00</p>
        </div>
        <img class="seta-img" src="./assets/Seta.png" alt="Seta" />
        <div class="valor-caixa">
          <img  class="valor-bandeira" src="./assets/Real 1.png" alt="Bandeira dos Estados Unidos" />
          <p class="moeda" id="nome-do-valor">Dólar</p>
          <p class="valor-moeda" id="tipo-da-moeda">R$ 0,00</p>
        </div>
      </section>
    </main>
    <script src="./scripts.js"></script>
  </body>
</html>
